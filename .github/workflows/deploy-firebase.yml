# Production deploy: Hosting + Cloud Functions (Python) + Firestore rules/indexes
#
# Repository secrets (Settings → Secrets and variables → Actions):
#   FIREBASE_TOKEN              (firebase login:ci)
#   EP_GEMINI_API_KEY
#   EP_GOOGLE_MAPS_API_KEY      (server; same value often used for Vite below)
#   EP_RECAPTCHA_SECRET_KEY
#
# Optional repository variables (Settings → Variables):
#   EP_GCP_PROJECT_ID           (default: civiksutra-2604261729 in write step)
#   EP_CORS_ORIGINS             (JSON array string; if unset, CORS is not in .env and code defaults apply)
#
name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://civiksutra-2604261729.web.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Write functions/.env (runtime config for Cloud Functions)
        working-directory: .
        env:
          EP_GEMINI_API_KEY: ${{ secrets.EP_GEMINI_API_KEY }}
          EP_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
          EP_RECAPTCHA_SECRET_KEY: ${{ secrets.EP_RECAPTCHA_SECRET_KEY }}
        run: |
          set -euo pipefail
          GCP_ID="${{ vars.EP_GCP_PROJECT_ID }}"
          if [ -z "$GCP_ID" ] || [ "$GCP_ID" = "null" ]; then
            GCP_ID="civiksutra-2604261729"
          fi
          {
            echo "EP_GEMINI_API_KEY=${EP_GEMINI_API_KEY}"
            echo "EP_GOOGLE_MAPS_API_KEY=${EP_GOOGLE_MAPS_API_KEY}"
            echo "EP_RECAPTCHA_SECRET_KEY=${EP_RECAPTCHA_SECRET_KEY}"
            echo "EP_GCP_PROJECT_ID=${GCP_ID}"
          } > functions/.env
          CORS='${{ vars.EP_CORS_ORIGINS }}'
          if [ -n "$CORS" ] && [ "$CORS" != "null" ]; then
            printf 'EP_CORS_ORIGINS=%s\n' "$CORS" >> functions/.env
          fi

      - name: Build frontend (Vite → frontend/dist)
        working-directory: frontend
        env:
          VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy (hosting, functions, Firestore)
        run: firebase deploy --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
