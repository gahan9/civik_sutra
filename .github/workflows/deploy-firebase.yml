# Production deploy: Hosting + Cloud Functions (Python) + Firestore rules/indexes
# Prerequisite: add repo secret FIREBASE_TOKEN (run locally: `firebase login:ci`, paste token in GitHub → Settings → Secrets)
name: Deploy Firebase

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: firebase-deploy-prod
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment:
      name: production
      url: https://civiksutra-2604261729.web.app
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend (Vite → frontend/dist)
        working-directory: frontend
        run: |
          npm ci
          npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy (hosting, functions, Firestore)
        # Uses default project from .firebaserc. Deploys: firebase.json targets.
        run: firebase deploy --non-interactive
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}
