# CivikSutra: smoke (fast) then full (coverage, all E2E, Lighthouse)
#
# Optional repo secrets/vars (same names as deploy) so build/test match production:
#   secrets: EP_GEMINI_API_KEY, EP_GOOGLE_MAPS_API_KEY, EP_RECAPTCHA_SECRET_KEY
#   vars:   EP_GCP_PROJECT_ID (optional; tests mostly mock)
# Optional: VITE_ maps key uses EP_GOOGLE_MAPS_API_KEY for CI builds (Lighthouse).
# Fork PRs: secrets/vars are unavailable; env is empty; tests are mocked.
name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Smallest: fast path (runs in parallel). Full jobs wait for both.
  smoke-frontend:
    runs-on: ubuntu-latest
    env:
      EP_GEMINI_API_KEY: ${{ secrets.EP_GEMINI_API_KEY }}
      EP_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_RECAPTCHA_SECRET_KEY: ${{ secrets.EP_RECAPTCHA_SECRET_KEY }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_GCP_PROJECT_ID: ${{ vars.EP_GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Typecheck, lint, format, unit tests (no coverage)
        run: npm run test:smoke
      - name: Install Playwright (Chromium only)
        run: npx playwright install --with-deps chromium
      - name: E2E smoke (e2e/smoke.spec.ts, Chromium)
        run: npm run test:e2e:smoke
        env:
          CI: "true"

  smoke-functions:
    runs-on: ubuntu-latest
    env:
      EP_GEMINI_API_KEY: ${{ secrets.EP_GEMINI_API_KEY }}
      EP_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_RECAPTCHA_SECRET_KEY: ${{ secrets.EP_RECAPTCHA_SECRET_KEY }}
      EP_GCP_PROJECT_ID: ${{ vars.EP_GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Pytest (no coverage report)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          python -m pytest tests/ -q

  # Full: Vitest coverage, all Playwright projects, pytest --cov, then Lighthouse
  frontend:
    needs: [smoke-frontend, smoke-functions]
    runs-on: ubuntu-latest
    env:
      EP_GEMINI_API_KEY: ${{ secrets.EP_GEMINI_API_KEY }}
      EP_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_RECAPTCHA_SECRET_KEY: ${{ secrets.EP_RECAPTCHA_SECRET_KEY }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_GCP_PROJECT_ID: ${{ vars.EP_GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install
        run: npm ci
      - name: Validate (typecheck, Prettier, lint, vitest + coverage)
        run: npm run validate
      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium
      - name: E2E (Chromium + mobile)
        run: npm run test:e2e
        env:
          CI: "true"

  functions:
    needs: [smoke-frontend, smoke-functions]
    runs-on: ubuntu-latest
    env:
      EP_GEMINI_API_KEY: ${{ secrets.EP_GEMINI_API_KEY }}
      EP_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_RECAPTCHA_SECRET_KEY: ${{ secrets.EP_RECAPTCHA_SECRET_KEY }}
      EP_GCP_PROJECT_ID: ${{ vars.EP_GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install and test with coverage
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"
          python -m pytest tests/ -q --cov=src

  lighthouse:
    runs-on: ubuntu-latest
    needs: [frontend, functions]
    env:
      EP_GEMINI_API_KEY: ${{ secrets.EP_GEMINI_API_KEY }}
      EP_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_RECAPTCHA_SECRET_KEY: ${{ secrets.EP_RECAPTCHA_SECRET_KEY }}
      VITE_GOOGLE_MAPS_API_KEY: ${{ secrets.EP_GOOGLE_MAPS_API_KEY }}
      EP_GCP_PROJECT_ID: ${{ vars.EP_GCP_PROJECT_ID }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Build production bundle
        run: npm run build
      - name: Lighthouse CI
        run: npm run lhci
